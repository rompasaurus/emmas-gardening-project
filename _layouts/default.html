<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>

  <!-- Floating flowers background -->
  <div class="flower-bg" aria-hidden="true">
    <span class="petal petal-1"></span>
    <span class="petal petal-2"></span>
    <span class="petal petal-3"></span>
    <span class="petal petal-4"></span>
    <span class="petal petal-5"></span>
    <span class="petal petal-6"></span>
    <span class="petal petal-7"></span>
    <span class="petal petal-8"></span>
  </div>

  <!-- Header -->
  <header class="site-header">
    <div class="header-inner">
      <div class="header-brand">
        <span class="header-flower">&#x1F338;</span>
        <a href="{{ '/' | relative_url }}" class="site-title">Emma's Garden</a>
        <span class="header-flower">&#x1F338;</span>
      </div>
      <p class="site-tagline">A sunny Stuttgart balcony in bloom</p>
    </div>
    <nav class="site-nav">
      <a href="{{ '/' | relative_url }}" class="nav-link {% if page.url == '/' or page.url == '/index.html' %}active{% endif %}">
        <span class="nav-icon">&#x1F3E0;</span> Home
      </a>
      <a href="{{ '/GARDEN-PLAN' | relative_url }}" class="nav-link {% if page.url contains 'GARDEN-PLAN' %}active{% endif %}">
        <span class="nav-icon">&#x1F4C5;</span> Garden Plan
      </a>
      <a href="{{ '/PROGRESS-REPORT' | relative_url }}" class="nav-link {% if page.url contains 'PROGRESS-REPORT' %}active{% endif %}">
        <span class="nav-icon">&#x2705;</span> Progress
      </a>
      <a href="{{ '/FUTURE-IDEAS' | relative_url }}" class="nav-link {% if page.url contains 'FUTURE-IDEAS' %}active{% endif %}">
        <span class="nav-icon">&#x2728;</span> Future Ideas
      </a>
      <a href="{{ '/GARDENING-RESEARCH' | relative_url }}" class="nav-link {% if page.url contains 'GARDENING-RESEARCH' %}active{% endif %}">
        <span class="nav-icon">&#x1F4DA;</span> Research
      </a>
    </nav>
  </header>

  <!-- Main content -->
  <main class="content">
    <article class="page-content">
      {{ content }}
    </article>
  </main>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="footer-flowers" aria-hidden="true">
      &#x1F33B; &#x1F337; &#x1F33C; &#x1F339; &#x1F33A; &#x1F33B; &#x1F337; &#x1F33C; &#x1F339; &#x1F33A;
    </div>
    <p class="footer-text">
      Emma's Balcony Flower Garden &mdash; Stuttgart 2026 &mdash; First-time Gardener
    </p>
    <p class="footer-sub">Made with love, soil, and sunshine</p>
  </footer>

</body>
</html>
